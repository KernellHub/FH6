<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERNEL_HUB — Forza Horizon 6</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,200;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange:  #FF6A00;
      --yellow:  #FFD200;
      --white:   #F0EDE8;
      --dim:     rgba(255,255,255,0.45);
      --glass:   rgba(10,8,6,0.55);
      --border:  rgba(255,106,0,0.35);
      --glow:    0 0 22px rgba(255,106,0,0.7), 0 0 60px rgba(255,106,0,0.35);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Exo 2', sans-serif;
      color: var(--white);
      cursor: default;
    }

    /* ─── BACKGROUND ─── */
    .bg {
      position: fixed; inset: 0;
      background:
        linear-gradient(160deg, rgba(0,0,0,0.72) 0%, rgba(5,4,2,0.5) 50%, rgba(0,0,0,0.85) 100%),
        url('https://i.imgur.com/bHSaPY9.jpeg') center/cover no-repeat;
      z-index: 0;
    }

    /* speed-line overlay */
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        105deg,
        transparent 0px,
        transparent 120px,
        rgba(255,106,0,0.04) 121px,
        rgba(255,106,0,0.04) 122px
      );
      pointer-events: none;
    }

    /* ─── SCANLINE GRAIN ─── */
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      opacity: 0.18;
    }

    /* ─── SPEED STREAKS ─── */
    .streaks {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
    }
    .streak {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      opacity: 0;
      animation: streak-fly 4s linear infinite;
    }
    @keyframes streak-fly {
      0%   { transform: translateX(-100%); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateX(110vw); opacity: 0; }
    }

    /* ─── LAYOUT ─── */
    .page {
      position: relative; z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid rgba(255,106,0,0.15);
      animation: fade-down 0.8s ease both;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
    }
    .logo span { color: var(--orange); }
    .version-badge {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--dim);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    /* ─── MAIN CENTRE ─── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
      padding: 0 20px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 18px;
      animation: fade-up 0.8s 0.2s ease both;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(38px, 7vw, 88px);
      font-weight: 900;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      animation: fade-up 0.8s 0.35s ease both;
    }
    .title .fh { display: block; }
    .title .six {
      display: block;
      -webkit-text-stroke: 2px var(--orange);
      color: transparent;
      font-size: 1.15em;
    }

    .divider {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      margin: 28px auto;
      animation: fade-up 0.8s 0.45s ease both;
    }

    .tagline {
      font-size: clamp(12px, 1.6vw, 15px);
      font-weight: 200;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 52px;
      animation: fade-up 0.8s 0.55s ease both;
    }

    /* ─── DOWNLOAD BUTTON ─── */
    .btn-wrap {
      animation: fade-up 0.8s 0.7s ease both;
    }
    .btn-download {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      color: #000;
      background: linear-gradient(135deg, var(--orange) 0%, var(--yellow) 100%);
      padding: 18px 48px;
      border: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      cursor: pointer;
      transition: all 0.25s ease;
      overflow: hidden;
    }
    .btn-download::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--yellow) 0%, #fff 100%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .btn-download:hover {
      box-shadow: var(--glow);
      transform: translateY(-2px) scale(1.03);
    }
    .btn-download:hover::before { opacity: 0.2; }
    .btn-download:active { transform: translateY(0) scale(0.99); }

    .btn-download svg { position: relative; z-index: 1; flex-shrink: 0; }
    .btn-download span { position: relative; z-index: 1; }

    /* pulse ring */
    .btn-wrap::after {
      content: '';
      display: block;
      width: 100%;
      height: 2px;
      margin-top: 8px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      animation: pulse-line 2.5s ease-in-out infinite;
    }
    @keyframes pulse-line {
      0%, 100% { opacity: 0.3; transform: scaleX(0.7); }
      50%       { opacity: 1;   transform: scaleX(1); }
    }

    /* ─── FOOTER ─── */
    footer {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 20px 40px 28px;
      gap: 32px;
      animation: fade-up 0.8s 0.85s ease both;
    }
    .support {
      text-align: right;
      border-right: 2px solid var(--orange);
      padding-right: 18px;
    }
    .support-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 10px;
    }
    .support-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      color: var(--dim);
      letter-spacing: 0.05em;
      margin-bottom: 5px;
      justify-content: flex-end;
    }
    .support-row svg { opacity: 0.6; flex-shrink: 0; }
    .support-row a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .support-row a:hover { color: var(--orange); }
    .support-hours {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
      margin-top: 8px;
    }

    /* ─── CORNER ACCENTS ─── */
    .corner {
      position: fixed; z-index: 2;
      width: 40px; height: 40px;
      pointer-events: none;
    }
    .corner--tl { top: 0; left: 0;
      border-top: 2px solid var(--orange); border-left: 2px solid var(--orange); }
    .corner--tr { top: 0; right: 0;
      border-top: 2px solid var(--orange); border-right: 2px solid var(--orange); }
    .corner--bl { bottom: 0; left: 0;
      border-bottom: 2px solid var(--orange); border-left: 2px solid var(--orange); }
    .corner--br { bottom: 0; right: 0;
      border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange); }

    /* ─── ANIMATIONS ─── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <!-- Speed streaks -->
  <div class="streaks" id="streaks"></div>

  <!-- Corner frame accents -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="page">

    <!-- HEADER -->
    <header>
      <div class="logo">KERNEL<span>_</span>HUB</div>
      <div class="version-badge">Current Version</div>
    </header>

    <!-- MAIN -->
    <main>
      <p class="eyebrow">Official Download Portal</p>

      <h1 class="title">
        <span class="fh">Forza Horizon</span>
        <span class="six">6</span>
      </h1>

      <div class="divider"></div>

      <p class="tagline">The open world. Redefined.</p>

      <div class="btn-wrap">
        <!--  ↓↓↓  Замени href на свою ссылку  ↓↓↓ -->
        <a class="btn-download" href="https://app.mediafire.com/folder/dxjzmusrk9ife" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Download</span>
        </a>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="support">
        <div class="support-title">Technical Support</div>
        <div class="support-row">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg>
          <a href="mailto:Kernelhub87@gmail.com">Kernelhub87@gmail.com</a>
        </div>
        <div class="support-row">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.99 0C5.37 0 0 5.373 0 12c0 2.117.554 4.104 1.524 5.829L.057 23.882l6.204-1.626A11.96 11.96 0 0 0 12 23.999C18.627 24 24 18.627 24 12S18.627 0 11.99 0z"/></svg>
          <span>+1 (646) 235-9510</span>
        </div>
        <div class="support-hours">10:00 – 21:00 &nbsp;(UTC+01:00)</div>
      </div>
    </footer>

  </div>

  <script>
    // Generate random speed streaks
    const container = document.getElementById('streaks');
    const COUNT = 18;

    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'streak';

      const top  = Math.random() * 100;
      const w    = 80 + Math.random() * 200;
      const dur  = 2.5 + Math.random() * 4;
      const del  = Math.random() * 6;
      const op   = 0.2 + Math.random() * 0.5;

      el.style.cssText = `
        top: ${top}vh;
        width: ${w}px;
        animation-duration: ${dur}s;
        animation-delay: ${del}s;
        opacity: 0;
        filter: blur(${Math.random() > 0.6 ? 1 : 0}px);
        max-opacity: ${op};
      `;
      container.appendChild(el);
    }
  </script>

</body>
</html>
